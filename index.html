<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnStepX Config Uploader</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 2em; }
        .container { max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 1em; }
        label { display: block; margin-bottom: 0.5em; }
        input[type="file"], input[type="text"], input[type="password"] { width: 100%; padding: 0.5em; }
        button { padding: 0.7em 1.5em; background-color: #0366d6; color: white; border: none; cursor: pointer; }
        #status { margin-top: 1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OnStepX Configuration Uploader</h1>
        <p>Upload your <code>Config.h</code> and <code>extended.config.h</code> files. This will commit them to the repository and trigger a build.</p>

        <form id="upload-form">
            <div class="form-group">
                <label for="config-h">Config.h</label>
                <input type="file" id="config-h" accept=".h" required>
            </div>
            <div class="form-group">
                <label for="extended-config-h">extended.config.h</label>
                <input type="file" id="extended-config-h" accept=".h">
            </div>
            <button type="submit">Upload and Build</button>
        </form>

        <div id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
