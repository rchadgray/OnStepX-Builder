name: Trigger OnStepX Build

on:
  repository_dispatch:
    types: [trigger-onstepx-build]

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Log Payload
        run: |
          echo "Received client payload:"
          echo "${{ toJSON(github.event.client_payload) }}"

      - name: Trigger build in OnStepX_Platformio
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: rchadgray/OnStepX_Platformio
          event-type: build-onstepx
          client-payload: |
            {
              "config_h": ${{ toJSON(github.event.client_payload.config_h) }},
              "extended_config_h": ${{ toJSON(github.event.client_payload.extended_config_h) }}
            }

